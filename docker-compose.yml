services:
  postgres:
    image: postgres:16-alpine
    container_name: agents_office_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agents_dev
      POSTGRES_PASSWORD: agents_dev_pass
      POSTGRES_DB: agents_office
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agents_dev -d agents_office"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
    driver: local
